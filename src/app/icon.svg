<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fb7185"/>
      <stop offset="100%" stop-color="#e11d48"/>
    </linearGradient>
    <linearGradient id="scoop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff1f2"/>
      <stop offset="100%" stop-color="#fecdd3"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="0" y="0" width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Ice cream scoop -->
  <circle cx="32" cy="24" r="11" fill="url(#scoop)"/>
  <!-- Cone -->
  <path d="M22 32 L42 32 L32 54 Z" fill="#fde68a" stroke="#f59e0b" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Waffle lines on cone -->
  <line x1="26" y1="38" x2="34" y2="38" stroke="#f59e0b" stroke-width="0.6" opacity="0.5"/>
  <line x1="28" y1="44" x2="36" y2="44" stroke="#f59e0b" stroke-width="0.6" opacity="0.5"/>
  <!-- Cherry on top -->
  <circle cx="32" cy="15" r="3" fill="#be123c"/>
  <path d="M32 12 Q34 9 36 10" fill="none" stroke="#065f46" stroke-width="1" stroke-linecap="round"/>
</svg>
